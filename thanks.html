<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="tailwind.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="tailwind.min.css"></noscript>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Message Sent! | Sparkle Heaven</title>
    <meta name="robots" content="noindex">
    
  <link rel="preload" href="styles.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="styles.min.css"></noscript>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.7);
            }

            70% {
                transform: scale(1.08);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pop-in {
            animation: popIn 0.55s cubic-bezier(.22, .68, 0, 1.2) both;
        }

        .fade-up {
            animation: fadeUp 0.5s ease both;
        }

        .delay-1 {
            animation-delay: 0.3s;
        }

        .delay-2 {
            animation-delay: 0.5s;
        }

        .delay-3 {
            animation-delay: 0.7s;
        }

        /* Confetti dots */
        .confetti-dot {
            position: absolute;
            border-radius: 50%;
            animation: fallDown 2.5s ease-out forwards;
        }

        @keyframes fallDown {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }

            100% {
                opacity: 0;
                transform: translateY(200px) rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-hero-gradient min-h-screen flex items-center justify-center font-['Inter'] overflow-hidden">

    <!-- Decorative blobs -->
    <div class="absolute top-10 left-10 w-64 h-64 rounded-full opacity-20 pointer-events-none"
        style="background:radial-gradient(circle,#D4AF37,transparent 70%);"></div>
    <div class="absolute bottom-10 right-10 w-64 h-64 rounded-full opacity-15 pointer-events-none"
        style="background:radial-gradient(circle,#C62828,transparent 70%);"></div>

    <div class="max-w-lg w-full mx-4">
        <div class="card-glass p-10 md:p-14 text-center border border-white/50 shadow-2xl relative overflow-hidden">

            <!-- Confetti dots (decorative) -->
            <div class="confetti-dot w-3 h-3 bg-[#D4AF37] absolute top-8 left-1/4" style="animation-delay:0.1s"></div>
            <div class="confetti-dot w-2 h-2 bg-[#C62828] absolute top-12 right-1/3" style="animation-delay:0.3s"></div>
            <div class="confetti-dot w-4 h-4 bg-amber-300 absolute top-6 right-1/4" style="animation-delay:0.2s"></div>
            <div class="confetti-dot w-2 h-2 bg-rose-400 absolute top-16 left-1/3" style="animation-delay:0.4s"></div>

            <!-- Icon -->
            <div
                class="pop-in w-24 h-24 rounded-full bg-green-100 border-4 border-green-200 flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                    stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>

            <!-- Heading -->
            <h1 class="fade-up delay-1 text-3xl md:text-4xl font-black text-gray-900 mb-3 leading-tight"
                style="font-family:'Poppins',sans-serif;">
                Message <span class="gradient-text">Sent!</span>
            </h1>

            <!-- Subtext -->
            <p class="fade-up delay-2 text-gray-600 text-base leading-relaxed mb-8">
                Thank you for contacting <strong>SparkleHeaven</strong>! <br>
                We've received your inquiry and will get back to you within <strong>24 hours</strong>.
            </p>

            <!-- Info pill -->
            <div
                class="fade-up delay-2 inline-flex items-center gap-2 bg-amber-50 border border-amber-200 text-amber-800 text-sm font-medium px-4 py-2 rounded-full mb-8">
                For urgent queries, WhatsApp us directly
            </div>

            <!-- Actions -->
            <div class="fade-up delay-3 flex flex-col sm:flex-row gap-3 justify-center">
                <a href="index.html"
                    class="inline-flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-bold text-white shadow-[0_6px_20px_rgba(212,175,55,0.3)] hover:scale-[1.03] transition-all text-sm"
                    style="background:linear-gradient(135deg,#D4AF37,#b8941f);">
                    Back to Home
                </a>
                <a href="contact-us.html"
                    class="inline-flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-bold text-gray-700 bg-white/70 border border-gray-200 hover:bg-white hover:scale-[1.03] transition-all text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    Send Another Message
                </a>
            </div>

        </div>
    </div>

  <script defer src="script.min.js"></script>
</body>

</html>
